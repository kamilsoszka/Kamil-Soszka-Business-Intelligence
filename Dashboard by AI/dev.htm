<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Key Performance Dashboard</title>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Global Dark Mode Styles */
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #FFFFFF;
      font-family: Arial, sans-serif;
    }
    header {
      text-align: center;
      padding: 20px;
      border-bottom: 1px solid #333;
    }
    header h1 {
      margin: 0;
      color: #4567b7;
    }
    /* Grid layout for dashboard */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-gap: 20px;
      padding: 20px;
    }
    /* Responsive: Single column on small screens */
    @media (max-width: 768px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
    }
    /* Container for each chart */
    .chart-container {
      background-color: #1e1e1e;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(69, 103, 183, 0.5);
    }
    .chart-title {
      text-align: center;
      font-size: 18px;
      margin-bottom: 10px;
    }
    canvas {
      background: transparent;
    }
  </style>
</head>
<body>
  <header>
    <h1>Key Performance Dashboard</h1>
  </header>
  
  <main class="dashboard">
    <!-- Line Chart: Sales -->
    <div class="chart-container">
      <div class="chart-title">Sales Over Time</div>
      <canvas id="salesLineChart"></canvas>
    </div>
    
    <!-- Line Chart: Gross Sales -->
    <div class="chart-container">
      <div class="chart-title">Gross Sales Over Time</div>
      <canvas id="grossSalesLineChart"></canvas>
    </div>
    
    <!-- Line Chart: Profit -->
    <div class="chart-container">
      <div class="chart-title">Profit Over Time</div>
      <canvas id="profitLineChart"></canvas>
    </div>
    
    <!-- Bar Chart: Price -->
    <div class="chart-container">
      <div class="chart-title">Price Comparison</div>
      <canvas id="priceBarChart"></canvas>
    </div>
    
    <!-- Bar Chart: COGS -->
    <div class="chart-container">
      <div class="chart-title">COGS Analysis</div>
      <canvas id="cogsBarChart"></canvas>
    </div>
    
    <!-- Bar Chart: Sold Units -->
    <div class="chart-container">
      <div class="chart-title">Units Sold</div>
      <canvas id="soldUnitsBarChart"></canvas>
    </div>
  </main>
  
  <script>
    // Dummy Data Arrays – Replace these with your actual JSON data when available
    const labels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
    const salesData      = [120, 150, 170, 130, 190, 220];
    const grossSalesData = [200, 180, 240, 210, 260, 300];
    const profitData     = [50, 60, 80, 70, 90, 100];
    const priceData      = [10, 15, 20, 18, 25, 30];
    const cogsData       = [5, 7, 8, 6, 10, 12];
    const soldUnitsData  = [100, 120, 150, 140, 160, 180];

    // Common options for dark mode appearance in all charts
    const commonOptions = {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: "#FFFFFF" }
        },
        tooltip: {
          backgroundColor: "#1e1e1e",
          titleColor: "#FFFFFF",
          bodyColor: "#FFFFFF",
          borderColor: "#4567b7",
          borderWidth: 1
        }
      },
      scales: {
        x: {
          ticks: { color: "#FFFFFF" },
          grid: { color: "#444" }
        },
        y: {
          ticks: { color: "#FFFFFF" },
          grid: { color: "#444" }
        }
      }
    };

    // Initialize the three Line Charts
    const ctxSales = document.getElementById('salesLineChart').getContext('2d');
    new Chart(ctxSales, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Sales',
          data: salesData,
          fill: false,
          borderColor: "#4567b7",
          tension: 0.3
        }]
      },
      options: commonOptions
    });

    const ctxGrossSales = document.getElementById('grossSalesLineChart').getContext('2d');
    new Chart(ctxGrossSales, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Gross Sales',
          data: grossSalesData,
          fill: false,
          borderColor: "#4567b7",
          tension: 0.3
        }]
      },
      options: commonOptions
    });

    const ctxProfit = document.getElementById('profitLineChart').getContext('2d');
    new Chart(ctxProfit, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Profit',
          data: profitData,
          fill: false,
          borderColor: "#4567b7",
          tension: 0.3
        }]
      },
      options: commonOptions
    });

    // Initialize the three Bar Charts
    const ctxPrice = document.getElementById('priceBarChart').getContext('2d');
    new Chart(ctxPrice, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Price',
          data: priceData,
          backgroundColor: "#4567b7"
        }]
      },
      options: commonOptions
    });

    const ctxCogs = document.getElementById('cogsBarChart').getContext('2d');
    new Chart(ctxCogs, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'COGS',
          data: cogsData,
          backgroundColor: "#4567b7"
        }]
      },
      options: commonOptions
    });

    const ctxSoldUnits = document.getElementById('soldUnitsBarChart').getContext('2d');
    new Chart(ctxSoldUnits, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Sold Units',
          data: soldUnitsData,
          backgroundColor: "#4567b7"
        }]
      },
      options: commonOptions
    });
  </script>
</body>
</html>
