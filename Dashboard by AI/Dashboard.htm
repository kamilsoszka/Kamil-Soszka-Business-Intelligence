<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0" 
  />
  <title>Data-Driven Sales Dashboard</title>
  <!-- Include a Google Font for modern, clean typography -->
  <link
    href="https://fonts.googleapis.com/css?family=Roboto:300,400,500"
    rel="stylesheet"
  />
  <!-- Chart.js Library -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* GENERAL & DARK MODE STYLING */
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #111111;
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #4567b7;
    }
    header h1 {
      margin: 0;
      font-size: 2em;
    }
    header p {
      margin-top: 10px;
      font-size: 1.2em;
      opacity: 0.8;
    }
    .container {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    /* SUMMARY / KPI SECTION */
    .summary {
      margin-bottom: 30px;
    }
    .summary h2 {
      border-bottom: 1px solid #4567b7;
      padding-bottom: 5px;
    }
    .kpi-card {
      background-color: #1a1a1a;
      border-left: 4px solid #4567b7;
      padding: 15px 20px;
      margin: 15px 0;
      border-radius: 5px;
    }
    .kpi-card h3 {
      margin: 0;
      font-size: 1.2em;
    }
    .kpi-card p {
      margin: 5px 0 0;
      font-size: 1.5em;
      font-weight: 500;
    }
    /* CHARTS GRID */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .chart-card {
      background-color: #1a1a1a;
      padding: 20px;
      border: 1px solid #333;
      border-radius: 8px;
    }
    /* Ensure canvases scale correctly */
    canvas {
      width: 100% !important;
      height: 300px !important;
    }
  </style>
</head>
<body>
  <!-- HEADER SECTION -->
  <header>
    <h1>Data-Driven Sales Dashboard</h1>
    <p>Insights and key performance indicators at a glance</p>
  </header>

  <!-- MAIN CONTENT -->
  <div class="container">
    <!-- SUMMARY / KPI SECTION -->
    <section class="summary">
      <h2>Summary</h2>
      <div class="kpi-card">
        <h3>Total Sales</h3>
        <p>$1,234,567</p>
      </div>
      <div class="kpi-card">
        <h3>Total Profit</h3>
        <p>$234,567</p>
      </div>
      <div class="kpi-card">
        <h3>Units Sold</h3>
        <p>12,345</p>
      </div>
    </section>
    
    <!-- CHARTS GRID -->
    <section class="charts-grid">
      <!-- Line Charts -->
      <div class="chart-card">
        <canvas id="chartSales"></canvas>
      </div>
      <div class="chart-card">
        <canvas id="chartGrossSales"></canvas>
      </div>
      <div class="chart-card">
        <canvas id="chartPrice"></canvas>
      </div>
      <!-- Bar Charts -->
      <div class="chart-card">
        <canvas id="chartProfit"></canvas>
      </div>
      <div class="chart-card">
        <canvas id="chartCOGS"></canvas>
      </div>
      <div class="chart-card">
        <canvas id="chartUnits"></canvas>
      </div>
    </section>
  </div>

  <!-- CHARTS INITIALIZATION SCRIPT -->
  <script>
    // Dummy data for demonstration purposes.
    const labels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];

    const salesData       = [120, 150, 180, 170, 160, 190];
    const grossSalesData  = [200, 210, 230, 220, 240, 250];
    const priceData       = [10, 12, 11, 13, 12, 14];
    const profitData      = [50, 65, 80, 75, 70, 85];
    const cogsData        = [70, 80, 90, 85, 80, 95];
    const soldUnitsData   = [100, 130, 120, 140, 150, 160];

    // Common Chart.js options for a cohesive style.
    const chartOptions = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        tooltip: {
          enabled: true,
          backgroundColor: '#4567b7'
        },
        legend: {
          display: false
        }
      },
      scales: {
        x: {
          ticks: { color: '#ffffff' },
          grid:  { color: '#333333' }
        },
        y: {
          ticks: { color: '#ffffff' },
          grid:  { color: '#333333' }
        }
      }
    };

    // Sales Line Chart
    const ctxSales = document.getElementById('chartSales').getContext('2d');
    new Chart(ctxSales, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Sales',
          data: salesData,
          borderColor: '#4567b7',
          backgroundColor: 'rgba(69,103,183,0.2)',
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        ...chartOptions,
        plugins: {
          tooltip: chartOptions.plugins.tooltip,
          title: {
            display: true,
            text: 'Sales Over Time',
            color: '#ffffff'
          }
        }
      }
    });

    // Gross Sales Line Chart
    const ctxGrossSales = document.getElementById('chartGrossSales').getContext('2d');
    new Chart(ctxGrossSales, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Gross Sales',
          data: grossSalesData,
          borderColor: '#4567b7',
          backgroundColor: 'rgba(69,103,183,0.2)',
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        ...chartOptions,
        plugins: {
          tooltip: chartOptions.plugins.tooltip,
          title: {
            display: true,
            text: 'Gross Sales Over Time',
            color: '#ffffff'
          }
        }
      }
    });

    // Price Line Chart
    const ctxPrice = document.getElementById('chartPrice').getContext('2d');
    new Chart(ctxPrice, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Price',
          data: priceData,
          borderColor: '#4567b7',
          backgroundColor: 'rgba(69,103,183,0.2)',
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        ...chartOptions,
        plugins: {
          tooltip: chartOptions.plugins.tooltip,
          title: {
            display: true,
            text: 'Price Trends',
            color: '#ffffff'
          }
        }
      }
    });

    // Profit Bar Chart
    const ctxProfit = document.getElementById('chartProfit').getContext('2d');
    new Chart(ctxProfit, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Profit',
          data: profitData,
          backgroundColor: '#4567b7',
          borderColor: '#4567b7',
          borderWidth: 1
        }]
      },
      options: {
        ...chartOptions,
        plugins: {
          tooltip: chartOptions.plugins.tooltip,
          title: {
            display: true,
            text: 'Profit Distribution',
            color: '#ffffff'
          }
        }
      }
    });

    // COGS Bar Chart
    const ctxCOGS = document.getElementById('chartCOGS').getContext('2d');
    new Chart(ctxCOGS, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'COGS',
          data: cogsData,
          backgroundColor: '#4567b7',
          borderColor: '#4567b7',
          borderWidth: 1
        }]
      },
      options: {
        ...chartOptions,
        plugins: {
          tooltip: chartOptions.plugins.tooltip,
          title: {
            display: true,
            text: 'COGS Analysis',
            color: '#ffffff'
          }
        }
      }
    });

    // Sold Units Bar Chart
    const ctxUnits = document.getElementById('chartUnits').getContext('2d');
    new Chart(ctxUnits, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Units Sold',
          data: soldUnitsData,
          backgroundColor: '#4567b7',
          borderColor: '#4567b7',
          borderWidth: 1
        }]
      },
      options: {
        ...chartOptions,
        plugins: {
          tooltip: chartOptions.plugins.tooltip,
          title: {
            display: true,
            text: 'Sold Units Comparison',
            color: '#ffffff'
          }
        }
      }
    });
  </script>
</body>
</html>
