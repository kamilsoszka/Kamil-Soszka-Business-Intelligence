<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minimalist Sales Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background-color: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 2rem;
    }
    h1 {
      text-align: center;
      margin-bottom: 1rem;
      color: #4567b7;
    }
    .dashboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
      margin-top: 2rem;
    }
    .kpi-container {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .kpi {
      background-color: #1a1a1a;
      padding: 1rem;
      border-radius: 10px;
      width: 180px;
      text-align: center;
      box-shadow: 0 0 10px rgba(69, 103, 183, 0.3);
    }
    .kpi h3 {
      margin: 0;
      font-size: 1.1rem;
      color: #ccc;
    }
    .kpi p {
      font-size: 1.5rem;
      font-weight: bold;
      color: #4567b7;
    }
    canvas {
      background-color: #1a1a1a;
      border-radius: 10px;
      padding: 1rem;
    }
  </style>
</head>
<body>

  <h1>Sales Performance Dashboard</h1>

  <div class="kpi-container">
    <div class="kpi"><h3>Total Sales</h3><p>$1.2M</p></div>
    <div class="kpi"><h3>Gross Sales</h3><p>$1.6M</p></div>
    <div class="kpi"><h3>Profit</h3><p>$400K</p></div>
    <div class="kpi"><h3>Avg Price</h3><p>$120</p></div>
    <div class="kpi"><h3>COGS</h3><p>$900K</p></div>
    <div class="kpi"><h3>Units Sold</h3><p>12K</p></div>
  </div>

  <div class="dashboard">
    <canvas id="salesChart"></canvas>
    <canvas id="grossSalesChart"></canvas>
    <canvas id="profitChart"></canvas>
    <canvas id="priceChart"></canvas>
    <canvas id="cogsChart"></canvas>
    <canvas id="unitsChart"></canvas>
  </div>

  <script>
    const config = (label, data, color, type = 'line') => ({
      type,
      data: {
        labels: data.labels,
        datasets: [{
          label,
          data: data.values,
          backgroundColor: color,
          borderColor: color,
          borderWidth: 2,
          tension: 0.4,
          fill: false
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: "#fff" } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: $${ctx.parsed.y.toLocaleString()}` }}
        },
        scales: {
          x: { ticks: { color: "#aaa" } },
          y: { ticks: { color: "#aaa" } }
        }
      }
    });

    // Sample data
    const labels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
    const dummyData = {
      sales: { labels, values: [120000, 150000, 180000, 140000, 200000, 170000] },
      grossSales: { labels, values: [160000, 180000, 210000, 170000, 220000, 200000] },
      profit: { labels, values: [40000, 30000, 50000, 30000, 50000, 30000] },
      price: { labels, values: [100, 120, 115, 130, 125, 140] },
      cogs: { labels, values: [80000, 90000, 100000, 95000, 110000, 100000] },
      units: { labels, values: [1000, 1300, 1200, 1500, 1600, 1700] }
    };

    new Chart(document.getElementById("salesChart"), config("Sales", dummyData.sales, "#4567b7"));
    new Chart(document.getElementById("grossSalesChart"), config("Gross Sales", dummyData.grossSales, "#61a0ff"));
    new Chart(document.getElementById("profitChart"), config("Profit", dummyData.profit, "#2ecc71"));
    new Chart(document.getElementById("priceChart"), config("Price", dummyData.price, "#e67e22", "bar"));
    new Chart(document.getElementById("cogsChart"), config("COGS", dummyData.cogs, "#e74c3c", "bar"));
    new Chart(document.getElementById("unitsChart"), config("Units Sold", dummyData.units, "#9b59b6", "bar"));
  </script>
</body>
</html>
