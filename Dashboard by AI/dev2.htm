<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Financial Dashboard</title>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Global Styles */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
      line-height: 1.6;
    }
    
    .container {
      width: 90%;
      max-width: 1200px;
      margin: 20px auto;
    }
    
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .header h1 {
      font-size: 2.5rem;
      margin: 0;
      color: #4567b7;
    }
    
    /* Grid for KPIs and charts */
    .dashboard-grid {
      display: grid;
      gap: 20px;
    }
    
    /* KPI Cards */
    .kpi-section {
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }
    
    .kpi-card {
      background-color: #111;
      border-left: 5px solid #4567b7;
      padding: 15px;
      border-radius: 5px;
      text-align: center;
    }
    
    .kpi-card h2 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }
    
    .kpi-card p {
      font-size: 1.5rem;
      margin: 0;
    }
    
    /* Chart Containers */
    .chart-section {
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }
    
    .chart-container {
      background-color: #111;
      padding: 15px;
      border-radius: 5px;
      height: 300px;
    }
    
    canvas {
      background-color: #222;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>Financial Dashboard</h1>
    </div>
    
    <!-- KPI Section -->
    <div class="dashboard-grid kpi-section">
      <div class="kpi-card">
        <h2>Sales</h2>
        <p id="sales-kpi">Loading...</p>
      </div>
      <div class="kpi-card">
        <h2>Gross Sales</h2>
        <p id="gross-sales-kpi">Loading...</p>
      </div>
      <div class="kpi-card">
        <h2>Price</h2>
        <p id="price-kpi">Loading...</p>
      </div>
      <div class="kpi-card">
        <h2>Profit</h2>
        <p id="profit-kpi">Loading...</p>
      </div>
      <div class="kpi-card">
        <h2>COGS</h2>
        <p id="cogs-kpi">Loading...</p>
      </div>
      <div class="kpi-card">
        <h2>Sold Units</h2>
        <p id="sold-units-kpi">Loading...</p>
      </div>
    </div>
    
    <!-- Charts Section -->
    <div class="dashboard-grid chart-section" style="margin-top: 40px;">
      <!-- Line Charts -->
      <div class="chart-container">
        <canvas id="lineChart1"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="lineChart2"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="lineChart3"></canvas>
      </div>
      <!-- Bar Charts -->
      <div class="chart-container">
        <canvas id="barChart1"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="barChart2"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="barChart3"></canvas>
      </div>
    </div>
  </div>
  
  <script>
    /* Sample Data Arrays (replace with dynamic data as needed) */
    const sampleLabels = ["Jan", "Feb", "Mar", "Apr", "May", "Jun"];
    const salesData = [100, 150, 130, 170, 160, 190];
    const grossSalesData = [80, 120, 100, 140, 130, 160];
    const priceData = [20, 25, 22, 27, 26, 30];
    const profitData = [50, 70, 65, 80, 75, 90];
    const cogsData = [30, 45, 40, 55, 50, 60];
    const soldUnitsData = [200, 250, 230, 270, 260, 300];
    
    /* Update KPI values by aggregating the data */
    document.getElementById('sales-kpi').innerText = "$" + salesData.reduce((a, b) => a + b, 0);
    document.getElementById('gross-sales-kpi').innerText = "$" + grossSalesData.reduce((a, b) => a + b, 0);
    document.getElementById('price-kpi').innerText = "$" + (priceData.reduce((a, b) => a + b, 0) / priceData.length).toFixed(2);
    document.getElementById('profit-kpi').innerText = "$" + profitData.reduce((a, b) => a + b, 0);
    document.getElementById('cogs-kpi').innerText = "$" + cogsData.reduce((a, b) => a + b, 0);
    document.getElementById('sold-units-kpi').innerText = soldUnitsData.reduce((a, b) => a + b, 0);
    
    /* Common configuration options for Chart.js */
    const commonOptions = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        tooltip: {
          callbacks: {
            label: function(context) {
              return context.dataset.label + ": " + context.parsed.y;
            }
          }
        },
        legend: { display: false }
      },
      scales: {
        x: {
          ticks: { color: "#fff" },
          grid: { color: "#444" }
        },
        y: {
          ticks: { color: "#fff" },
          grid: { color: "#444" }
        }
      }
    };
    
    /* Define accent color for charts */
    const accentColor = '#4567b7';
    
    /* Line Chart Configurations */
    const lineChartConfigs = [
      { element: 'lineChart1', data: salesData, title: 'Sales Over Time' },
      { element: 'lineChart2', data: grossSalesData, title: 'Gross Sales Over Time' },
      { element: 'lineChart3', data: profitData, title: 'Profit Over Time' }
    ];
    
    lineChartConfigs.forEach(config => {
      const ctx = document.getElementById(config.element).getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: sampleLabels,
          datasets: [{
            label: config.title,
            data: config.data,
            borderColor: accentColor,
            backgroundColor: 'rgba(69, 103, 183, 0.4)',
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          ...commonOptions,
          plugins: {
            ...commonOptions.plugins,
            title: {
              display: true,
              text: config.title,
              color: "#fff"
            }
          }
        }
      });
    });
    
    /* Bar Chart Configurations */
    const barChartConfigs = [
      { element: 'barChart1', data: priceData, title: 'Price Over Time' },
      { element: 'barChart2', data: cogsData, title: 'COGS Over Time' },
      { element: 'barChart3', data: soldUnitsData, title: 'Sold Units Over Time' }
    ];
    
    barChartConfigs.forEach(config => {
      const ctx = document.getElementById(config.element).getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: sampleLabels,
          datasets: [{
            label: config.title,
            data: config.data,
            backgroundColor: accentColor
          }]
        },
        options: {
          ...commonOptions,
          plugins: {
            ...commonOptions.plugins,
            title: {
              display: true,
              text: config.title,
              color: "#fff"
            }
          }
        }
      });
    });
  </script>
</body>
</html>
